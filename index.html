<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croqodil Image-to-Prompt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --surface: #111111;
            --border: #1A1A1A;
            --gold-primary: #C9A84C;
            --gold-light: #E8C96B;
            --gold-dark: #8B6914;
            --gold-gradient: linear-gradient(135deg, #8B6914, #C9A84C, #E8C96B, #C9A84C, #8B6914);
            --text-primary: #F5F5F0;
            --text-muted: #666660;
            --error: #FF4444;
            --success: #4CAF50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.9); }
        }

        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes toastIn {
            from { transform: translateX(100%) translateY(20px); opacity: 0; }
            to { transform: translateX(0) translateY(0); opacity: 1; }
        }

        /* --- Layout --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .croc-icon {
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .croc-icon svg {
            filter: drop-shadow(0 0 10px rgba(201, 168, 76, 0.3));
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: var(--gold-gradient);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 6s linear infinite;
        }

        .subtitle {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-top: -4px;
        }

        .badge-gemini {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--gold-primary);
            background: rgba(201, 168, 76, 0.1);
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid rgba(201, 168, 76, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold-primary);
            animation: pulse 2s infinite;
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* --- Upload Zone --- */
        .upload-zone {
            margin-top: 2rem;
            width: 100%;
            min-height: 300px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: var(--surface);
            overflow: hidden;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--gold-primary);
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.15);
            transform: scale(1.01);
        }

        .upload-zone.dragover {
            border-style: solid;
            transform: scale(1.02);
        }

        .upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 1;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--gold-primary);
        }

        .upload-text {
            color: var(--text-primary);
            font-weight: 500;
        }

        .format-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            background: var(--bg);
        }

        /* --- Tabs --- */
        .analysis-container {
            display: none; /* Shown after upload */
            flex-direction: column;
            gap: 1rem;
            animation: fadeInSlideUp 0.5s ease forwards;
        }

        .tabs-wrapper {
            background: var(--surface);
            padding: 6px;
            border-radius: 100px;
            display: flex;
            gap: 4px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px 20px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--gold-gradient);
            color: var(--bg);
            box-shadow: 0 4px 15px rgba(139, 105, 20, 0.3);
        }

        .typo-input-wrapper {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 1rem;
            animation: fadeInSlideUp 0.3s ease forwards;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed var(--border);
        }

        .secondary-upload {
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .secondary-upload:hover {
            border-color: var(--gold-primary);
            background: rgba(201, 168, 76, 0.05);
        }

        .secondary-upload.has-image {
            border-style: solid;
        }

        .secondary-preview {
            max-width: 100%;
            max-height: 120px;
            border-radius: 8px;
            display: none;
        }

        .secondary-upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            gap: 5px;
        }

        .typo-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .typo-input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.1);
        }

        .tab-desc {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-primary);
            text-align: center;
            font-weight: 700;
        }

        /* --- Output Box --- */
        .output-panel {
            background: #0D0D0D;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: none; /* Shown after upload */
            flex-direction: column;
            animation: fadeInSlideUp 0.5s ease forwards;
        }

        .output-header {
            background: #151515;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .mac-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #FF5F56; }
        .dot.yellow { background: #FFBD2E; }
        .dot.green { background: #27C93F; }

        .output-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 15px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: var(--gold-primary);
            color: var(--bg);
        }

        .copy-btn.success {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .output-content {
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            padding: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            position: relative;
        }

        /* Syntax Highlighting */
        .json-key { color: var(--gold-primary); }
        .json-string { color: var(--gold-light); }
        .json-number { color: #8B9467; }
        .json-boolean, .json-null { color: #888; }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 13, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201, 168, 76, 0.1);
            border-top: 3px solid var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .output-footer {
            background: #151515;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border);
        }

        .footer-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-btn:hover {
            color: var(--gold-primary);
        }

        /* --- Footer --- */
        footer {
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .footer-logo {
            font-size: 1.2rem;
            margin-bottom: -1rem;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .social-icon {
            color: var(--text-muted);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon:hover {
            color: var(--gold-primary);
            transform: translateY(-3px);
            filter: drop-shadow(0 0 8px rgba(201, 168, 76, 0.4));
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .pill-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--gold-primary);
            font-weight: 600;
        }

        /* --- Toast --- */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            background: var(--surface);
            border-left: 4px solid var(--gold-primary);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.85rem;
            min-width: 250px;
            animation: toastIn 0.3s ease forwards;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toast.error {
            border-left-color: var(--error);
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            header { padding: 1rem; }
            .logo { font-size: 1.4rem; }
            .tabs-wrapper { flex-direction: column; border-radius: 20px; padding: 10px; }
            .tab { border-radius: 10px; }
            .output-content { padding: 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo">CROQODIL</div>
            <div class="subtitle">image-to-prompt</div>
        </div>
    </header>

    <main>
        <!-- Upload Section -->
        <section class="upload-zone" id="drop-zone">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div class="upload-content">
                <div class="upload-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                </div>
                <div class="upload-text">Drop your image here or click to upload</div>
                <div class="format-badge">PNG · JPG · WEBP · GIF</div>
            </div>
            <img id="image-preview" alt="Preview">
        </section>

        <!-- Analysis Section -->
        <section class="analysis-container" id="analysis-section">
            <div class="tabs-wrapper">
                <button class="tab active" data-tab="1">Full Image</button>
                <button class="tab" data-tab="2">Direction</button>
                <button class="tab" data-tab="3">DNA Style</button>
                <button class="tab" data-tab="4">TYPO</button>
            </div>
            <div class="typo-input-wrapper" id="typo-input-wrapper">
                <div class="secondary-upload" id="secondary-style-upload">
                    <input type="file" id="file-input-2" accept="image/*" hidden>
                    <div class="secondary-upload-content" id="secondary-content">
                        <div style="font-size: 1.5rem; color: var(--gold-primary); line-height: 1;">+</div>
                        <span>Add Second Style Image (Optional Merge)</span>
                    </div>
                    <img id="secondary-preview-img" class="secondary-preview" alt="Secondary Preview">
                </div>
                <input type="text" id="typo-custom-text" class="typo-input" placeholder="Type your custom text here... (e.g. 'CROQODIL')">
                <div style="font-size: 0.7rem; color: var(--text-muted); padding-left: 10px;">Enter the exact text you want to see in the new generated image</div>
            </div>
            <div class="tab-desc" id="tab-description">FULL IMAGE ANALYSIS & PROMPT GENERATION</div>
        </section>

        <!-- Output Section -->
        <section class="output-panel" id="output-section">
            <div class="output-header">
                <div style="display: flex; align-items: center;">
                    <div class="mac-dots">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                    </div>
                    <div class="output-label">output.json</div>
                </div>
                <button class="copy-btn" id="copy-json">Copy JSON</button>
            </div>
            <div class="output-content" id="json-display"></div>
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <div style="color: var(--gold-primary); font-weight: 600;">Analyzing with Gemini...</div>
            </div>
            <div class="output-footer">
                <button class="footer-btn" id="re-analyze">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                    Re-Analyze
                </button>
                <button class="footer-btn" id="download-json">
                    Download .json
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                </button>
            </div>
        </section>
    </main>

            <!-- Gmail -->
            <a href="mailto:omar.croqodil@gmail.com" class="social-icon" title="Email">
                <svg viewBox="0 0 24 24"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L12 9.573l8.073-6.08c1.618-1.214 3.927-.059 3.927 1.964z"/></svg>
            </a>
        </div>

        <div class="badge-gemini">
            <div class="pulse-dot"></div>
            Powered by Gemini
        </div>
    </footer>

    <div id="toast-container"></div>

    <script>
        // --- State ---
        let currentImageBase64 = null;
        let currentImage2Base64 = null;
        let currentMimeType = null;
        let activeTab = 1;
        let isAnalyzing = false;

        const tabDescriptions = {
            1: "FULL IMAGE ANALYSIS & PROMPT GENERATION",
            2: "DIRECTIONAL & CINEMATOGRAPHIC ANALYSIS",
            3: "VISUAL STYLE DNA & ARTISTIC FINGERPRINT",
            4: "TYPOGRAPHY STYLE REFERENCE & PROMPT ADAPTATION"
        };

        const systemPrompts = {
            1: "You are an expert AI image generation prompt engineer. Analyze this image in extreme detail and return ONLY a valid JSON object with these exact keys: subject, composition, lighting, colors, textures, mood, style, camera_angle, background, quality_tags. No explanation, no markdown, only raw JSON.",
            2: "You are a creative director and cinematographer. Analyze the directional and compositional choices in this image and return ONLY a valid JSON object with these exact keys: primary_concept, narrative, scene_type, subject_focus, spatial_layout, depth_of_field, movement_feeling, emotional_tone, symbolic_elements. No explanation, no markdown, only raw JSON.",
            3: "You are an art historian and visual style analyst. Extract the complete visual style fingerprint of this image and return ONLY a valid JSON object with these exact keys: art_movement, rendering_style, color_palette_name, texture_quality, line_work, material_properties, era_influence, technical_approach, unique_identifiers. No explanation, no markdown, only raw JSON.",
            4: "You are a specialized prompt engineer for 'Image Reference' workflows. Your goal is to write a prompt that, when used WITH the provided source image(s) as a reference, will generate a new image with the user's custom text while preserving the style. If ONE image is provided, replicate its style exactly. If TWO images are provided, you MUST intelligently merge the typographic DNA, textures, and lighting of both images into a cohesive new aesthetic. Focus 100% on describing the style, material, lighting, and camera settings. The prompt must be 'surgical'—meaning it describes the visual DNA so perfectly that the user only needs to swap the text content to get a perfect result. Return ONLY a valid JSON object with: typographic_style, texture_and_material, lighting_setup, merge_strategy (if two images), generation_prompt (the specific prompt for the new text, optimized for use as a style-matching reference). No explanation, no markdown, only raw JSON."
        };

        // --- DOM Elements ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const analysisSection = document.getElementById('analysis-section');
        const outputSection = document.getElementById('output-section');
        const jsonDisplay = document.getElementById('json-display');
        const loadingOverlay = document.getElementById('loading-overlay');
        const tabDescription = document.getElementById('tab-description');
        const tabs = document.querySelectorAll('.tab');
        const copyBtn = document.getElementById('copy-json');
        const downloadBtn = document.getElementById('download-json');
        const reAnalyzeBtn = document.getElementById('re-analyze');
        const toastContainer = document.getElementById('toast-container');
        const typoInputWrapper = document.getElementById('typo-input-wrapper');
        const typoCustomText = document.getElementById('typo-custom-text');
        const secondaryUpload = document.getElementById('secondary-style-upload');
        const fileInput2 = document.getElementById('file-input-2');
        const secondaryPreviewImg = document.getElementById('secondary-preview-img');
        const secondaryContent = document.getElementById('secondary-content');

        // --- Event Listeners ---
        dropZone.addEventListener('click', () => fileInput.click());
        secondaryUpload.addEventListener('click', () => fileInput2.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        fileInput2.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile2(file);
        });

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (isAnalyzing) return;
                const tabNum = parseInt(tab.dataset.tab);
                setActiveTab(tabNum);
                analyzeImage();
            });
        });

        copyBtn.addEventListener('click', () => {
            const text = jsonDisplay.innerText;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.innerText = "Copied!";
                copyBtn.classList.add('success');
                setTimeout(() => {
                    copyBtn.innerText = "Copy JSON";
                    copyBtn.classList.remove('success');
                }, 1500);
            });
        });

        downloadBtn.addEventListener('click', () => {
            const text = jsonDisplay.innerText;
            const blob = new Blob([text], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `croqodil_analysis_tab${activeTab}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        reAnalyzeBtn.addEventListener('click', () => {
            analyzeImage();
        });

        // --- Functions ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<span>${message}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function handleFile(file) {
            currentMimeType = file.type;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 800;
                    const scale = Math.min(1, maxWidth / img.width);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    imagePreview.src = canvas.toDataURL('image/jpeg');
                    imagePreview.style.display = 'block';
                    
                    const uploadContent = dropZone.querySelector('.upload-content');
                    if (uploadContent) uploadContent.style.display = 'none';
                    
                    if (analysisSection) analysisSection.style.display = 'flex';
                    if (outputSection) outputSection.style.display = 'flex';
                    analyzeImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleFile2(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 600;
                    const scale = Math.min(1, maxWidth / img.width);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    currentImage2Base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    secondaryPreviewImg.src = canvas.toDataURL('image/jpeg');
                    secondaryPreviewImg.style.display = 'block';
                    secondaryContent.style.display = 'none';
                    secondaryUpload.classList.add('has-image');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setActiveTab(num) {
            activeTab = num;
            tabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${num}"]`).classList.add('active');
            tabDescription.innerText = tabDescriptions[num];
            
            // Toggle TYPO input visibility
            if (num === 4) {
                typoInputWrapper.style.display = 'flex';
            } else {
                typoInputWrapper.style.display = 'none';
            }
        }

        async function analyzeImage() {
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
                showToast("Gemini API key is not configured. Please add it to your environment variables.", "error");
                return;
            }
            if (!currentImageBase64) {
                showToast("Please upload an image first", "error");
                return;
            }

            isAnalyzing = true;
            loadingOverlay.style.display = 'flex';
            jsonDisplay.innerHTML = '';

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            
            const parts = [
                { text: activeTab === 4 ? `${systemPrompts[activeTab]}\n\nUser's desired text for new image: "${typoCustomText.value || '[AUTO-DETECT LOGICAL TEXT FROM SCENE]'}"` : systemPrompts[activeTab] },
                { inline_data: { mime_type: "image/jpeg", data: currentImageBase64 } }
            ];

            if (activeTab === 4 && currentImage2Base64) {
                parts.push({ inline_data: { mime_type: "image/jpeg", data: currentImage2Base64 } });
            }

            const payload = {
                contents: [{ parts }],
                generationConfig: {
                    temperature: 0.4,
                    maxOutputTokens: 2048
                }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "API Error");
                }

                const rawText = data.candidates[0].content.parts[0].text;
                let cleanJson = rawText.trim();
                
                // Remove markdown code blocks if present
                if (cleanJson.startsWith('```')) {
                    cleanJson = cleanJson.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                }

                try {
                    const parsed = JSON.parse(cleanJson);
                    const formatted = JSON.stringify(parsed, null, 4);
                    typewriterEffect(formatted);
                } catch (e) {
                    typewriterEffect(rawText);
                }

            } catch (err) {
                showToast(err.message, "error");
                jsonDisplay.innerText = `Error: ${err.message}`;
            } finally {
                isAnalyzing = false;
                loadingOverlay.style.display = 'none';
            }
        }

        function typewriterEffect(text) {
            jsonDisplay.innerHTML = '';
            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    // We need to handle syntax highlighting while typing? 
                    // That's complex. Let's type raw and highlight at the end or in chunks.
                    // For simplicity and requested effect, let's type raw then highlight.
                    jsonDisplay.innerText = text.substring(0, i + 1);
                    i++;
                    jsonDisplay.scrollTop = jsonDisplay.scrollHeight;
                } else {
                    clearInterval(interval);
                    highlightJSON();
                }
            }, 5);
        }

        function highlightJSON() {
            let json = jsonDisplay.innerText;
            
            // Basic syntax highlighting with regex
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            const highlighted = json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
            
            jsonDisplay.innerHTML = highlighted;
        }
    </script>
</body>
</html>
